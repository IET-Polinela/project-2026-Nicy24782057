{% extends 'base.html' %}

{% block title %}Hapus Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Hapus</li>
    </ol>
</nav>

<div class="card">
    <div class="card-body">
        <h2 class="page-title mb-3 text-danger">Hapus Laporan</h2>
        <p>Yakin ingin menghapus laporan <strong>{{ report.title }}</strong>?</p>

        <form method="post" onsubmit="return confirmDelete('Apakah kamu yakin ingin menghapus laporan ini?');">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Ya, Hapus</button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</div>
{% endblock %}
