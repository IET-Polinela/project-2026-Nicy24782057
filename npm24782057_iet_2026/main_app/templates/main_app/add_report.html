{% extends 'base.html' %}

{% block title %}Tambah Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/">Home</a></li>
        <li class="breadcrumb-item"><a href="{% url 'report_list' %}">Reports</a></li>
        <li class="breadcrumb-item active" aria-current="page">Tambah</li>
    </ol>
</nav>

<div class="card">
    <div class="card-body">
        <h2 class="page-title mb-4">Tambah Laporan Kota Bandar Lampung</h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label">Judul</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label for="{{ form.category.id_for_label }}" class="form-label">Kategori</label>
                {{ form.category }}
            </div>

            <div class="mb-3">
                <label for="{{ form.description.id_for_label }}" class="form-label">Deskripsi</label>
                {{ form.description }}
            </div>

            <div class="mb-3">
                <label for="{{ form.location.id_for_label }}" class="form-label">Lokasi</label>
                {{ form.location }}
            </div>

            <button type="submit" class="btn btn-primary" onclick="event.preventDefault(); setLoading(this, 'Menyimpan...');">
                Submit
            </button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">Kembali</a>
        </form>
    </div>
</div>
{% endblock %}
