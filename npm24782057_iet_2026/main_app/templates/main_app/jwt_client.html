<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JWT Client</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        input, textarea, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 4px;
        }

        pre {
            background: #222;
            color: #0f0;
            padding: 15px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        h1, h2 {
            margin-top: 0;
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>JWT Web Client</h1>

    <div class="row">
        <div class="card">
            <h2>Register Citizen</h2>
            <input id="registerUsername" placeholder="Username">
            <input id="registerEmail" placeholder="Email">
            <input id="registerPassword" type="password" placeholder="Password">
            <button onclick="registerCitizen()">Register</button>
        </div>

        <div class="card">
            <h2>Login Citizen</h2>
            <input id="loginUsername" placeholder="Username">
            <input id="loginPassword" type="password" placeholder="Password">
            <button onclick="loginCitizen()">Login</button>
        </div>
    </div>

    <div class="card">
        <h2>Create Report</h2>
        <input id="title" placeholder="Title">
        <input id="category" placeholder="Category">
        <textarea id="description" placeholder="Description"></textarea>
        <input id="location" placeholder="Location">
        <select id="status">
            <option value="DRAFT">DRAFT</option>
            <option value="REPORTED">REPORTED</option>
            <option value="VERIFIED">VERIFIED</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="RESOLVED">RESOLVED</option>
        </select>
        <button onclick="createReport()">POST Report</button>
    </div>

    <div class="card">
        <h2>GET ALL Report</h2>
        <button onclick="getReports()">GET ALL</button>
    </div>

    <div class="card">
        <h2>PUT Report</h2>
        <input id="putId" placeholder="Report ID">
        <input id="putTitle" placeholder="Title">
        <input id="putCategory" placeholder="Category">
        <textarea id="putDescription" placeholder="Description"></textarea>
        <input id="putLocation" placeholder="Location">
        <select id="putStatus">
            <option value="DRAFT">DRAFT</option>
            <option value="REPORTED">REPORTED</option>
            <option value="VERIFIED">VERIFIED</option>
            <option value="IN_PROGRESS">IN_PROGRESS</option>
            <option value="RESOLVED">RESOLVED</option>
        </select>
        <button onclick="updateReport()">PUT Report</button>
    </div>

    <div class="card">
        <h2>DELETE Report</h2>
        <input id="deleteId" placeholder="Report ID">
        <button onclick="deleteReport()">DELETE Report</button>
    </div>

    <div class="card">
        <h2>Output</h2>
        <pre id="output">Belum ada response.</pre>
    </div>
</div>

<script>
    const baseUrl = "http://127.0.0.1:8000";

    function showOutput(data) {
        document.getElementById("output").textContent = JSON.stringify(data, null, 4);
    }

    function getAccessToken() {
        return localStorage.getItem("access");
    }

    function getRefreshToken() {
        return localStorage.getItem("refresh");
    }

    async function refreshAccessToken() {
        const response = await fetch(`${baseUrl}/api/token/refresh/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                refresh: getRefreshToken()
            })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("access", data.access);
            return data.access;
        }

        throw data;
    }

    async function apiFetch(url, options = {}) {
        let token = getAccessToken();

        options.headers = {
            ...(options.headers || {}),
            Authorization: `Bearer ${token}`
        };

        let response = await fetch(url, options);
        let data = await response.json().catch(() => ({}));

        if (response.status === 401 && getRefreshToken()) {
            token = await refreshAccessToken();

            options.headers = {
                ...(options.headers || {}),
                Authorization: `Bearer ${token}`
            };

            response = await fetch(url, options);
            data = await response.json().catch(() => ({}));
        }

        showOutput({
            status: response.status,
            data: data
        });

        return data;
    }

    async function registerCitizen() {
        const response = await fetch(`${baseUrl}/api/auth/register/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: document.getElementById("registerUsername").value,
                email: document.getElementById("registerEmail").value,
                password: document.getElementById("registerPassword").value
            })
        });

        const data = await response.json();

        showOutput({
            status: response.status,
            data: data
        });
    }

    async function loginCitizen() {
        const response = await fetch(`${baseUrl}/api/token/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: document.getElementById("loginUsername").value,
                password: document.getElementById("loginPassword").value
            })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem("access", data.access);
            localStorage.setItem("refresh", data.refresh);
        }

        showOutput({
            status: response.status,
            data: data
        });
    }

    async function createReport() {
        await apiFetch(`${baseUrl}/api/report/`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: document.getElementById("title").value,
                category: document.getElementById("category").value,
                description: document.getElementById("description").value,
                location: document.getElementById("location").value,
                status: document.getElementById("status").value
            })
        });
    }

    async function getReports() {
        await apiFetch(`${baseUrl}/api/report/`, {
            method: "GET"
        });
    }

    async function updateReport() {
        const id = document.getElementById("putId").value;

        await apiFetch(`${baseUrl}/api/report/${id}/`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: document.getElementById("putTitle").value,
                category: document.getElementById("putCategory").value,
                description: document.getElementById("putDescription").value,
                location: document.getElementById("putLocation").value,
                status: document.getElementById("putStatus").value
            })
        });
    }

    async function deleteReport() {
        const id = document.getElementById("deleteId").value;

        await apiFetch(`${baseUrl}/api/report/${id}/`, {
            method: "DELETE"
        });
    }
</script>
</body>
</html>
